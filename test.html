<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiv Ordtest A1-A2</title>
    <!-- Tailwind CSS for moderne design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center">

    <div id="quiz-app" class="max-w-2xl w-full px-4 py-8 md:py-12">
        
        <!-- Overskrift og poeng -->
        <div class="flex items-center justify-between mb-8 bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 text-left">
                <div class="p-2.5 bg-indigo-600 rounded-xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-lg leading-none mb-1">Ordtest A1-A2</h1>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Kapittel 3 & 13</p>
                </div>
            </div>
            <div class="bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100 text-right">
                <span class="text-[10px] font-bold text-slate-400 block uppercase tracking-tight">Poeng</span>
                <span id="live-score" class="text-xl font-black text-indigo-600">0</span>
            </div>
        </div>

        <!-- Fremdriftslinje -->
        <div class="mb-8 px-1">
            <div class="flex justify-between items-end mb-2">
                <span id="q-count" class="text-xs font-bold text-slate-500 uppercase tracking-tight">Laster...</span>
                <span id="q-percent" class="text-sm font-black text-indigo-600">0%</span>
            </div>
            <div class="h-3 w-full bg-slate-200 rounded-full overflow-hidden shadow-inner">
                <div id="prog-bar" class="h-full bg-indigo-500 transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Spørsmålskort -->
        <div id="card" class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-200 p-6 md:p-10 relative overflow-hidden">
            <div id="badge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase tracking-widest mb-6 border border-indigo-100">
                Kategori
            </div>
            
            <h2 id="q-text" class="text-xl md:text-2xl font-bold mb-8 text-slate-800 leading-tight text-left">
                Laster inn spørsmål...
            </h2>

            <div id="options" class="space-y-3"></div>

            <!-- Tilbakemelding -->
            <div id="feedback" class="mt-8 pt-8 border-t border-slate-100 hidden animate-fade-in text-left">
                <div class="flex gap-4 p-5 rounded-2xl bg-slate-50 border border-slate-200 mb-6">
                    <div class="flex-shrink-0 w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <span class="block font-bold text-slate-800 text-sm mb-1">Forklaring:</span>
                        <p id="exp-text" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>
                </div>
                <button onclick="next()" class="w-full flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-bold py-5 px-6 rounded-2xl transition-all shadow-lg text-lg">
                    Neste oppgave
                </button>
            </div>
        </div>
    </div>

    <!-- Resultatskjerm -->
    <div id="results" class="max-w-md w-full px-4 py-12 hidden">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 text-center">
            <div class="bg-indigo-600 p-12 text-white">
                <h2 class="text-4xl font-black mb-2 tracking-tight italic">FERDIG!</h2>
                <p class="text-indigo-100 font-medium opacity-80 uppercase tracking-widest text-sm">Ordtesten er fullført</p>
            </div>
            <div class="p-10">
                <div id="final-score" class="text-7xl font-black text-indigo-600 mb-4 tabular-nums">0 / 25</div>
                <p id="res-msg" class="text-slate-500 font-medium mb-10 leading-relaxed px-4"></p>
                <button onclick="location.reload()" class="w-full flex items-center justify-center gap-3 bg-slate-900 hover:bg-black text-white font-bold py-5 px-6 rounded-2xl transition-all shadow-xl active:scale-95">
                    Prøv på nytt
                </button>
            </div>
        </div>
    </div>

    <script>
        // Liste over alle spørsmål
        const questions = [
            { cat: "Skolesystemet (3.1)", q: "Hva gjør en elev på 'studiespesialisering'?", opt: ["Lærer et håndverk", "Forbereder seg til universitetet", "Jobber som lærling", "Mekker på biler"], ans: "Forbereder seg til universitetet", exp: "Studiespesialisering gir deg studiekompetanse til å studere videre på universitet eller høyskole." },
            { cat: "Følelser (3.1)", q: "Hva betyr det å 'være lei'?", opt: ["Å være veldig glad", "Å være trøtt eller ha fått nok", "Å være flink i matte", "Å være aktiv"], ans: "Å være trøtt eller ha fått nok", exp: "Når man er lei, har man ikke lyst eller energi til å fortsette med noe." },
            { cat: "Skole (3.1)", q: "Hva heter skolen for barn mellom 6 og 13 år?", opt: ["Ungdomsskole", "Videregående skole", "Barneskole / Grunnskole", "Universitet"], ans: "Barneskole / Grunnskole", exp: "Grunnskolen i Norge består av barneskole (1.-7. trinn) og ungdomsskole (8.-10. trinn)." },
            { cat: "Yrker (3.1)", q: "En person som jobber med å slukke branner er en...", opt: ["brannmann", "rørlegger", "agronom", "helsefagarbeider"], ans: "brannmann", exp: "En brannmann (eller brannkonstabel) hjelper til ved brann og andre ulykker." },
            { cat: "Samarbeid (3.1)", q: "Hva er en 'utviklingssamtale'?", opt: ["En samtale om været", "Et møte mellom lærer og foreldre", "En samtale om lønn", "En forelesning"], ans: "Et møte mellom lærer og foreldre", exp: "I en utviklingssamtale snakker lærer, foreldre og elev om elevens utvikling og trivsel." },
            { cat: "Skoleuttrykk (3.1)", q: "Hva betyr 'minst' i: 'Du må lese minst 20 minutter'?", opt: ["Ikke mer enn 20", "Akkurat 20", "20 minutter eller mer", "Mindre enn 20"], ans: "20 minutter eller mer", exp: "Minst betyr den nedre grensen, altså minimum 20 minutter." },
            { cat: "Grammatikk (3.1)", q: "Hva er 'fordi', 'når' og 'da' eksempler på?", opt: ["Substantiv", "Verb", "Subjunksjoner", "Adjektiv"], ans: "Subjunksjoner", exp: "Subjunksjoner binder sammen setninger og starter leddsetninger." },
            { cat: "Adjektiv (13.2)", q: "Hva er det motsatte av 'ubrukelig'?", opt: ["Nyttig", "Rotete", "Ulik", "Vanskelig"], ans: "Nyttig", exp: "Noe som er nyttig er til god hjelp eller praktisk å bruke." },
            { cat: "Skolehverdag (13.2)", q: "Hva gjør du hvis det er noe du ikke forstår?", opt: ["Jeg forklarer fort", "Jeg stiller spørsmål", "Jeg bytter på", "Jeg tjener penger"], ans: "Jeg stiller spørsmål", exp: "Det er viktig å stille spørsmål for å lære mer og fjerne misforståelser." },
            { cat: "Yrkesfag (13.3)", q: "Hva kalles beviset man får etter bestått fagprøve?", opt: ["Studiekompetanse", "Fagbrev", "Lønnslipp", "Innkalning"], ans: "Fagbrev", exp: "Fagbrevet beviser at du er en faglært arbeider i yrket ditt." },
            { cat: "Landbruk (13.3)", q: "Ei jente som har rett til å overta en gård er ei...", opt: ["Lærling", "Studiekompetanse", "Odelsjente", "Helsefagarbeider"], ans: "Odelsjente", exp: "Odelsretten gjør at barnet til bonden har rett til å ta over familiegården." },
            { cat: "Utdanning (13.3)", q: "Hva må du ta for å få studiekompetanse etter yrkesfag?", opt: ["En fagprøve", "Et år påbygging", "SFO", "En lærlingperiode"], ans: "Et år påbygging", exp: "Påbygging til generell studiekompetanse gir deg fagene du trenger for universitetet." },
            { cat: "Grammatikk (13.3)", q: "Bonden trives på gården ____. (Egen gård)", opt: ["sin", "sitt", "sine", "hans"], ans: "sin", exp: "Vi bruker 'sin/sitt/sine' når tingen tilhører subjektet i setningen." },
            { cat: "Økonomi (13.4)", q: "Hvor søker studenter om lån og stipend i Norge?", opt: ["I banken", "Hos politiet", "I Lånekassen", "Hos Nav"], ans: "I Lånekassen", exp: "Lånekassen er statens organ for økonomisk støtte til utdanning." },
            { cat: "Bolig (13.4)", q: "Hvis et rom ikke er ryddig i det hele tatt, er det...", opt: ["felles", "obligatorisk", "rotete", "nyttig"], ans: "rotete", exp: "Rotete er det motsatte av ryddig." },
            { cat: "Studentliv (13.4)", q: "I et kollektiv er det vanlig at man har en ____ vaskeliste.", opt: ["ulik", "felles", "fullført", "økonomisk"], ans: "felles", exp: "Felles betyr at alle beboerne deler på ansvaret for vaskingen." },
            { cat: "Utdanning (13.4)", q: "En 'forelesning' skjer vanligvis på...", opt: ["ungdomsskolen", "SFO", "universitetet", "et verksted"], ans: "universitetet", exp: "Forelesning er en undervisningsform ved høyere utdanning." },
            { cat: "Yrkesfag (3.1)", q: "Hvis du liker å reparere biler, liker du å...", opt: ["mekke", "danse", "spørre", "forklare"], ans: "mekke", exp: "Å mekke betyr å reparere eller skru på maskiner og tekniske ting." },
            { cat: "Skole (3.1)", q: "Hva er et annet ord for SFO (f.eks. i Oslo)?", opt: ["Kollektiv", "Aktivitetsskole", "Høyskole", "Lærlingperiode"], ans: "Aktivitetsskole", exp: "Aktivitetsskole (AKS) er det samme som Skolefritidsordning (SFO)." },
            { cat: "Skolefag (3.1)", q: "I hvilket fag lærer man om tall og beregning?", opt: ["Naturfag", "Gym", "Matte", "Design"], ans: "Matte", exp: "Matte er kortformen av matematikk." },
            { cat: "Yrkesvalg (13.3)", q: "Vil du jobbe i barnehage eller skole, går du...", opt: ["Studiespesialisering", "Helse- og oppvekstfag", "Landbruk", "Ambulansefag"], ans: "Helse- og oppvekstfag", exp: "Dette faget forbereder deg på arbeid med mennesker i alle aldre." },
            { cat: "Samarbeid (3.1)", q: "En skriftlig invitasjon til et møte kalles en...", opt: ["Fagbrev", "Innkalling", "Studielån", "Tittel"], ans: "Innkalling", exp: "Når man blir bedt om å møte opp til en bestemt tid, får man en innkalling." },
            { cat: "Studentliv (13.4)", q: "Å 'bytte på' oppgaver betyr å...", opt: ["Gjøre alt selv", "Ikke gjøre noe", "Gjøre det etter tur", "Slutte"], ans: "Gjøre det etter tur", exp: "Når man bytter på, veksler man på hvem som gjør jobben." },
            { cat: "Utdanning (13.3)", q: "Å lære et yrke praktisk i et firma kalles...", opt: ["Forelesning", "Lærlingperiode", "Gym", "SFO"], ans: "Lærlingperiode", exp: "I lærlingperioden kombinerer man arbeid og opplæring i en bedrift." },
            { cat: "Økonomi (13.4)", q: "Studenter jobber ofte ved siden av studiene for å...", opt: ["tjene penger", "fullføre", "stille spørsmål", "bytte på"], ans: "tjene penger", exp: "Mange studenter trenger ekstra lønn for å dekke utgiftene sine." }
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userScore = 0;
        let hasAnswered = false;

        // Stokker om på rekkefølge
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Starter testen
        function start() {
            shuffledQuestions = shuffle([...questions]).map(q => ({
                ...q, opt: shuffle([...q.opt])
            }));
            currentIndex = 0;
            userScore = 0;
            show();
        }

        // Viser et spørsmål
        function show() {
            hasAnswered = false;
            const item = shuffledQuestions[currentIndex];
            document.getElementById('live-score').innerText = userScore;
            document.getElementById('q-count').innerText = `Oppgave ${currentIndex + 1} av ${shuffledQuestions.length}`;
            
            const percentage = (currentIndex / shuffledQuestions.length) * 100;
            document.getElementById('q-percent').innerText = Math.round(percentage) + "%";
            document.getElementById('prog-bar').style.width = percentage + "%";
            
            document.getElementById('badge').innerText = item.cat;
            document.getElementById('q-text').innerText = item.q;
            document.getElementById('exp-text').innerText = item.exp;
            document.getElementById('feedback').classList.add('hidden');

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            item.opt.forEach(option => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 md:p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 bg-slate-50 flex items-center justify-between group";
                btn.innerHTML = `<span>${option}</span><div class="w-6 h-6 rounded-full border-2 border-slate-200 transition-all flex items-center justify-center text-white text-[10px] font-bold"></div>`;
                btn.onclick = () => check(option, btn);
                optionsDiv.appendChild(btn);
            });
        }

        // Sjekker svaret
        function check(choice, btn) {
            if (hasAnswered) return;
            hasAnswered = true;
            const item = shuffledQuestions[currentIndex];
            const allBtns = document.querySelectorAll('.option-btn');

            allBtns.forEach(b => {
                const text = b.querySelector('span').innerText;
                const circle = b.querySelector('div');
                b.classList.remove('hover:border-indigo-400', 'hover:bg-indigo-50');

                if (text === item.ans) {
                    b.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-900', 'font-bold');
                    circle.classList.add('bg-emerald-500', 'border-emerald-500');
                    circle.innerText = '✓';
                } else if (text === choice) {
                    b.classList.add('border-rose-500', 'bg-rose-50', 'text-rose-900');
                    circle.classList.add('bg-rose-500', 'border-rose-500');
                    circle.innerText = '✕';
                } else {
                    b.style.opacity = '0.4';
                }
            });

            if (choice === item.ans) userScore++;
            document.getElementById('feedback').classList.remove('hidden');
        }

        // Går til neste
        function next() {
            currentIndex++;
            if (currentIndex < shuffledQuestions.length) {
                show();
            } else {
                done();
            }
        }

        // Viser resultater
        function done() {
            document.getElementById('quiz-app').classList.add('hidden');
            const res = document.getElementById('results');
            res.classList.remove('hidden');
            document.getElementById('final-score').innerText = `${userScore} / ${shuffledQuestions.length}`;
            
            let msg = "Du bør øve litt mer på ordlisten. Prøv igjen!";
            if (userScore === shuffledQuestions.length) msg = "Helt perfekt! Du kan alle ordene!";
            else if (userScore > shuffledQuestions.length * 0.8) msg = "Veldig bra jobba! Du kan det meste.";
            else if (userScore > shuffledQuestions.length * 0.5) msg = "Ganske bra, men du har fortsatt litt igjen.";
            
            document.getElementById('res-msg').innerText = msg;
        }

        window.onload = start;
    </script>
</body>
</html>
