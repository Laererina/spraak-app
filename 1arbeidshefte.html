        function renderNav() {
            const navHTML = tabs.map(tab => `
                <button
                    onclick="switchTab('${tab.id}')"
                    class="flex items-center space-x-2 px-4 py-3 font-medium rounded-t-lg transition-colors duration-200 ${
                        activeTab === tab.id
                            ? 'bg-white text-blue-700 border-t-2 border-x-2 border-blue-500 shadow-[0_-2px_5px_rgba(0,0,0,0.05)]'
                            : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border-b-2 border-transparent'
                    }"
                >
                    <i data-lucide="${tab.icon}" class="w-[18px] h-[18px]"></i>
                    <span>${tab.label}</span>
                </button>
            `).join('');
            document.getElementById('tabs-nav').innerHTML = navHTML;
            
            // Bytt innhold
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${activeTab}`).classList.add('active');
            
            lucide.createIcons();
        }

        function switchTab(tabId) {
            activeTab = tabId;
            renderNav();
            if (tabId === 'ordliste') renderOrdliste();
            if (tabId === 'grammatikk') renderGrammatikk();
            if (tabId === 'rollespill') renderRollespill();
            if (tabId === 'caser') renderCaser();
            lucide.createIcons();
        }

        // --- ORDLISTE FUNKSJONER ---
        function playAudio(text, event) {
            event.stopPropagation();
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'nb-NO';
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleCard(id) {
            flippedCards[id] = !flippedCards[id];
            renderOrdlisteGrid();
            lucide.createIcons();
        }

        function updateSearch(value) {
            searchTerm = value;
            renderOrdlisteGrid();
            lucide.createIcons();
        }

        function renderOrdlisteGrid() {
            const filteredWords = ORDLISTE.filter(item => 
                item.w.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.m.toLowerCase().includes(searchTerm.toLowerCase())
            );

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            
            if (filteredWords.length === 0) {
                html += `</div><p class="text-center text-gray-500 py-10">Ingen ord funnet for "${searchTerm}".</p>`;
            } else {
                html += filteredWords.map(item => {
                    const isFlipped = flippedCards[item.id];
                    const safeWord = item.w.replace(/'/g, "\\'"); // Escape for inline onclick
                    return `
                        <div 
                            onclick="toggleCard(${item.id})"
                            class="cursor-pointer min-h-[140px] p-5 rounded-xl border transition-all duration-300 flex flex-col justify-center items-center text-center shadow-sm hover:shadow-md relative ${
                                isFlipped ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-200'
                            }"
                        >
                            <button 
                                onclick="playAudio('${safeWord}', event)"
                                class="absolute top-3 right-3 p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-100 rounded-full transition-colors z-10"
                                title="Hør uttale"
                            >
                                <i data-lucide="volume-2" class="w-5 h-5"></i>
                            </button>

                            ${!isFlipped ? `
                                <div class="mt-2">
                                    <span class="text-sm font-medium text-blue-500 mb-2 block">Kort ${item.id}</span>
                                    <h3 class="text-lg font-bold text-gray-800">${item.w}</h3>
                                </div>
                            ` : `
                                <div class="w-full text-left pt-2">
                                    <h3 class="text-sm font-bold text-blue-700 border-b border-blue-200 pb-1 mb-2">${item.w}</h3>
                                    <p class="text-sm text-gray-800 mb-2"><strong>Betydning:</strong> ${item.m}</p>
                                    <p class="text-sm text-gray-600 italic">"${item.e}"</p>
                                </div>
                            `}
                        </div>
                    `;
                }).join('');
                html += `</div>`;
            }
            
            const gridContainer = document.getElementById('ordliste-grid-container');
            if(gridContainer) gridContainer.innerHTML = html;
        }

        function renderOrdliste() {
            document.getElementById('tab-ordliste').innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Ordliste (30 ord, fraser og uttrykk)</h2>
                        <p class="text-gray-600 mb-6">Klikk på kortene for å snu dem og se forklaring og eksempel. Bruk søkefeltet for å finne spesifikke ord.</p>
                        
                        <div class="relative mb-6">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="search" class="h-5 w-5 text-gray-400"></i>
                            </div>
                            <input
                                type="text"
                                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                placeholder="Søk i ordlisten..."
                                value="${searchTerm}"
                                oninput="updateSearch(this.value)"
                            />
                        </div>
                        <div id="ordliste-grid-container"></div>
                    </div>
                </div>
            `;
            renderOrdlisteGrid();
        }

        // --- GRAMMATIKK FUNKSJONER ---
        function updateAnswer(id, val) {
            quizAnswers[id] = val;
        }

        function sjekkSvar(sectionId) {
            quizShowResults[sectionId] = true;
            renderGrammatikk();
            lucide.createIcons();
        }

        function checkAnswer(userAns, correctAns) {
            if (!userAns) return false;
            const cleanUser = userAns.toLowerCase().trim().replace(/[.?]/g, '');
            if (Array.isArray(correctAns)) {
                return correctAns.some(a => cleanUser === a.toLowerCase().trim().replace(/[.?]/g, ''));
            }
            return cleanUser === correctAns.toLowerCase().trim().replace(/[.?]/g, '');
        }

        function generateQuizSection(title, description, questions, sectionId) {
            const showResults = quizShowResults[sectionId];
            let score = 0;
            
            const questionsHtml = questions.map((q, index) => {
                const userAns = quizAnswers[q.id] || '';
                const isCorrect = showResults && checkAnswer(userAns, q.a);
                const isWrong = showResults && !isCorrect;
                if (isCorrect) score++;

                let bgClass = 'bg-gray-50 border-gray-200';
                let inputClass = 'border-gray-300 focus:ring-blue-200 focus:border-blue-400';
                
                if (isCorrect) {
                    bgClass = 'bg-green-50 border-green-200';
                    inputClass = 'border-green-400 focus:ring-green-200';
                } else if (isWrong) {
                    bgClass = 'bg-red-50 border-red-200';
                    inputClass = 'border-red-400 focus:ring-red-200';
                }

                const fasitText = Array.isArray(q.a) ? q.a.join(" eller ") : q.a;

                return `
                    <div class="p-4 rounded-md border ${bgClass}">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                            <span class="font-semibold text-gray-500 min-w-[30px]">${index + 1}.</span>
                            <span class="flex-grow text-gray-800">${q.q}</span>
                            <input
                                type="text"
                                value="${userAns}"
                                oninput="updateAnswer('${q.id}', this.value)"
                                class="flex-grow sm:max-w-[250px] px-3 py-2 border rounded-md focus:outline-none focus:ring-2 ${inputClass}"
                                placeholder="Ditt svar..."
                            />
                            ${showResults ? `
                                <div class="min-w-[24px]">
                                    ${isCorrect 
                                        ? `<i data-lucide="check" class="text-green-500 w-6 h-6"></i>` 
                                        : `<i data-lucide="x" class="text-red-500 w-6 h-6"></i>`}
                                </div>
                            ` : ''}
                        </div>
                        ${isWrong ? `
                            <div class="mt-2 text-sm text-red-600 pl-10">
                                <strong>Fasit:</strong> ${fasitText}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            return `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-1">${title}</h3>
                    <p class="text-gray-600 mb-6 text-sm">${description}</p>
                    <div class="space-y-4">
                        ${questionsHtml}
                    </div>
                    <div class="mt-6 flex items-center justify-between">
                        <button
                            onclick="sjekkSvar('${sectionId}')"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors"
                        >
                            Sjekk svar
                        </button>
                        ${showResults ? `
                            <div class="text-lg font-bold text-gray-800">
                                Score: <span class="${score === questions.length ? 'text-green-600' : 'text-blue-600'}">${score} / ${questions.length}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderGrammatikk() {
            document.getElementById('tab-grammatikk').innerHTML = `
                <div class="space-y-2">
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg mb-6">
                        <h2 class="text-xl font-bold text-blue-900 mb-2">Grammatikkoppgaver</h2>
                        <p class="text-blue-800 text-sm">Øv på å stille spørsmål og gi tydelige beskjeder. Fyll inn svarene dine og trykk på "Sjekk svar" for å rette.</p>
                    </div>
                    ${generateQuizSection("Del A: Spørreord", "Sett inn riktig spørreord: Hvem, Hva, Hvor, Hvordan, Når, Hvorfor.", GRAMMATIKK_A, "A")}
                    ${generateQuizSection("Del B: Vennlig imperativ", "Gi en beskjed. Husk at imperativ er verbet uten 'e' til slutt. (Eksempel: Å spise -> Spis)", GRAMMATIKK_B, "B")}
                    ${generateQuizSection("Del C: Lag ja/nei-spørsmål", "Gjør om påstanden til et spørsmål ved å flytte verbet til posisjon 1. (Eksempel: Du er kvalm. -> Er du kvalm?)", GRAMMATIKK_C, "C")}
                    ${generateQuizSection("Del D: Ordstilling", "Sett ordene i riktig rekkefølge for å lage spørsmål. Pass på stor forbokstav og spørsmålstegn.", GRAMMATIKK_D, "D")}
                </div>
            `;
        }

        // --- ROLLESPILL FUNKSJONER ---
        function drawRandomCard() {
            randomCardIndex = Math.floor(Math.random() * ROLLESPILL.length);
            randomCardMode = true;
            renderRollespill();
            lucide.createIcons();
        }

        function closeRandomCard() {
            randomCardMode = false;
            renderRollespill();
            lucide.createIcons();
        }

        function renderRollespill() {
            const cardsHtml = ROLLESPILL.map((item, index) => `
                <div class="border border-gray-200 rounded-lg p-5 hover:shadow-md transition-shadow bg-gray-50">
                    <div class="flex items-center space-x-3 mb-3">
                        <div class="bg-blue-100 text-blue-800 font-bold w-8 h-8 rounded-full flex items-center justify-center shrink-0">
                            ${index + 1}
                        </div>
                        <h3 class="font-bold text-gray-800">${item.title}</h3>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed">${item.desc}</p>
                </div>
            `).join('');

            let randomCardHtml = '';
            if (randomCardMode && randomCardIndex !== null) {
                const card = ROLLESPILL[randomCardIndex];
                randomCardHtml = `
                    <div class="mb-8 p-6 bg-teal-50 border-2 border-teal-200 rounded-xl relative">
                        <button 
                            onclick="closeRandomCard()"
                            class="absolute top-4 right-4 text-gray-500 hover:text-gray-700"
                        >
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                        <span class="text-teal-600 font-bold tracking-wider text-xs uppercase mb-2 block">Ditt Scenario</span>
                        <h3 class="text-2xl font-bold text-gray-900 mb-3">${card.title}</h3>
                        <p class="text-gray-700 text-lg leading-relaxed">${card.desc}</p>
                    </div>
                `;
            }

            document.getElementById('tab-rollespill').innerHTML = `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800 mb-2">Rollespill (15 situasjoner)</h2>
                            <p class="text-gray-600 text-sm max-w-2xl">
                                Arbeid i par. En er helsefagarbeider/sykepleier, den andre er pasient (beboer). 
                                Bruk ordene og spørsmålene dere har lært. Bytt på rollene.
                            </p>
                        </div>
                        <button 
                            onclick="drawRandomCard()"
                            class="flex items-center space-x-2 bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-md transition-colors whitespace-nowrap shadow-sm"
                        >
                            <i data-lucide="refresh-cw" class="w-[18px] h-[18px]"></i>
                            <span>Trekk tilfeldig kort</span>
                        </button>
                    </div>
                    ${randomCardHtml}
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        ${cardsHtml}
                    </div>
                </div>
            `;
        }

        // --- CASER FUNKSJONER ---
        function updateNote(id, val) {
            userNotes[id] = val;
        }

        function toggleFasit(id) {
            showFasitMap[id] = !showFasitMap[id];
            renderCaser();
            lucide.createIcons();
        }

        function renderCaser() {
            const caserHtml = CASER.map(c => {
                const noteVal = userNotes[c.id] || '';
                const showFasit = showFasitMap[c.id];

                return `
                    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                        <div class="p-5 border-b border-gray-100 bg-gray-50">
                            <div class="flex items-start gap-3">
                                <span class="bg-gray-800 text-white text-xs font-bold px-2 py-1 rounded">Case ${c.id}</span>
                                <p class="text-gray-800 font-medium">${c.text}</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <p class="text-blue-800 text-sm font-semibold mb-3">Oppgave: ${c.task}</p>
                            <textarea
                                oninput="updateNote(${c.id}, this.value)"
                                class="w-full border border-gray-300 rounded-md p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 min-h-[100px] mb-4"
                                placeholder="Skriv ditt svar her..."
                            >${noteVal}</textarea>
                            
                            <div class="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                                <button
                                    onclick="toggleFasit(${c.id})"
                                    class="flex items-center space-x-2 text-sm font-medium text-teal-600 hover:text-teal-800 transition-colors"
                                >
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                    <span>${showFasit ? 'Skjul løsningsforslag' : 'Vis løsningsforslag'}</span>
                                </button>
                            </div>

                            ${showFasit ? `
                                <div class="mt-4 p-4 bg-teal-50 border border-teal-100 rounded-md">
                                    <h4 class="text-xs font-bold text-teal-800 uppercase tracking-wider mb-1">Forslag til svar:</h4>
                                    <p class="text-teal-900">${c.fasit}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('tab-caser').innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Caseoppgaver for skriftlig trening</h2>
                        <p class="text-gray-600 text-sm">
                            Les de korte situasjonene. Skriv ned hvordan du vil snakke i situasjonen. 
                            Når du har forsøkt selv, kan du klikke på "Vis løsningsforslag" for inspirasjon.
                        </p>
                    </div>
                    <div class="space-y-6">
                        ${caserHtml}
                    </div>
                </div>
            `;
        }

        // --- INIT ---
        window.onload = () => {
            renderNav();
            switchTab('ordliste');
        };
    </script>
</body>
</html>
